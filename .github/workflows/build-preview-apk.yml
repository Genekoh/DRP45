name: Build Android APK (Preview Build) on merge/push to main

on:
  workflow_run:
    workflows: ["CI Checks on merge/push to main"]
    types:
      - completed
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        id: build
        run: |
          BUILD_URL=$(eas build --platform android --profile preview --non-interactive --json | jq -r '.[0].artifacts.buildUrl')
          echo "BUILD_URL=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Download APK from EAS
        run: |
          curl -L -o app-development.apk "${{ steps.build.outputs.BUILD_URL }}"

      - name: Upload APK as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-preview-${{ github.sha }}
          path: app-preview.apk
          retention-days: 30
