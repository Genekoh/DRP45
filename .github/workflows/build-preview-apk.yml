name: Build Android APK (Preview Build)

on:
  workflow_run:
    workflows: ["CI Checks on merge/push to main"]
    types:
      - completed
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Cache Expo prebuild
        uses: actions/cache@v4
        id: expo-prebuild-cache
        with:
          path: android
          key: expo-prebuild-${{ runner.os }}-${{ hashFiles('package-lock.json', 'app.json', 'app.config.js', 'app.config.ts') }}

      - name: Expo Prebuild
        if: steps.expo-prebuild-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --clean

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --no-daemon

      - name: Upload APK as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-preview-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
